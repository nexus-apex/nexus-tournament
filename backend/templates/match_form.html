{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Match | NexusTournament{% endblock %}
{% block page_title %}{% if editing %}Edit Match{% else %}New Match{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Tournament Name</label>
        <input type="text" name="tournament_name" value="{{ record.tournament_name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Team A</label>
        <input type="text" name="team_a" value="{{ record.team_a|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Team B</label>
        <input type="text" name="team_b" value="{{ record.team_b|default:'' }}">
      </div>
      <div class="form-group">
        <label>Venue</label>
        <input type="text" name="venue" value="{{ record.venue|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" name="date" value="{{ record.date|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Score</label>
        <input type="text" name="score" value="{{ record.score|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="scheduled" {% if record.status == 'scheduled' %}selected{% endif %}>Scheduled</option>
          <option value="live" {% if record.status == 'live' %}selected{% endif %}>Live</option>
          <option value="completed" {% if record.status == 'completed' %}selected{% endif %}>Completed</option>
          <option value="postponed" {% if record.status == 'postponed' %}selected{% endif %}>Postponed</option>
          <option value="cancelled" {% if record.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
        </select>
      </div>
      <div class="form-group">
        <label>Winner</label>
        <input type="text" name="winner" value="{{ record.winner|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Match</button>
      <a href="/matches/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
